spring:
  datasource:
    url: jdbc:h2:mem:fenxiao-local;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  admin:
    token: ${ADMIN_TOKEN}
  web:
    allowed-origins: ${WEB_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}
  distribution:
    profile-create-token: ${PROFILE_CREATE_TOKEN}
    internal-token: ${INTERNAL_DISTRIBUTION_TOKEN}
