spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/fenxiao?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:fenxiao}
    password: ${DB_PASSWORD:fenxiao123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  web:
    allowed-origins: ${WEB_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173}
  distribution:
    internal-token: ${INTERNAL_DISTRIBUTION_TOKEN:change-me-in-production}
