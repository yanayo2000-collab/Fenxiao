version: '3.9'
services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      PROFILE_CREATE_TOKEN: ${PROFILE_CREATE_TOKEN}
      INTERNAL_DISTRIBUTION_TOKEN: ${INTERNAL_DISTRIBUTION_TOKEN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      WEB_ALLOWED_ORIGINS: ${WEB_ALLOWED_ORIGINS}
      SERVER_PORT: ${SERVER_PORT:-8080}
    depends_on:
      - mysql
    ports:
      - "8080:8080"

  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ../frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  mysql-data:
